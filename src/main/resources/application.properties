spring.application.name=psitaland
spring.datasource.url=jdbc:postgresql://db.bqpmicshzrykvxabphsd.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_PWD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Logs ----
# Nível geral
logging.level.root=WARN
# Logs da aplicação (INFO mostra operações, DEBUG mostra detalhes)
logging.level.com.psitaland=INFO
# Logs do Hibernate SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ---- Serialização JSON ----
# Não serializar campos null na resposta
spring.jackson.default-property-inclusion=non_null
# Formato de datas como string (ex: 2024-01-15)
spring.jackson.serialization.write-dates-as-timestamps=false